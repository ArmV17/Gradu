<ion-header class="ion-no-border">
  <ion-toolbar class="custom-toolbar">
    <ion-title>Estudio Gradu</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="irAMedicion()" class="btn-nueva">
        NUEVA MEDIDA
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding gray-bg">
  <div class="responsive-container">
    <div class="header-text">
      <h1 class="main-title">Eventos por Escuela</h1>
      <p class="sub-title">Escuelas con registros activos</p>
    </div>

    <ion-grid class="ion-no-padding">
      <ion-row>
        <ion-col size="12" size-md="6" *ngFor="let escuela of (escuelas$ | async)">
          <div class="escuela-card-dark">
            <div class="card-icon">
              <ion-icon name="business"></ion-icon>
            </div>
            <div class="card-info">
              <h2 class="escuela-name">{{ escuela }}</h2>
              <p class="escuela-action">Ver estadísticas y registros</p>
            </div>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>
